name: poll-gpu-availability

# Half-hourly poll of DO GPU availability, committing results to availability.csv.
on:
  schedule:
    # At :07 and :37 (GitHub cron runs in UTC and is best-effort — it can be
    # delayed several minutes under load, which is fine for sampling).
    - cron: "7,37 * * * *"
  workflow_dispatch: {}   # lets you run it on demand from the Actions tab

# Allow the job to push the updated CSV back to the repo.
permissions:
  contents: write

concurrency:
  group: poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # continue-on-error so a failed poll (expired cookie) still reaches the
      # commit step — gpu_monitor.py writes a NO_DATA row before exiting
      # non-zero, and we want that row committed. A final step re-fails the
      # run so the failure is still visible / notifies by email.
      - name: Poll DO GPU availability
        id: poll
        continue-on-error: true
        env:
          DO_COOKIE: ${{ secrets.DO_COOKIE }}
        run: python gpu_monitor.py

      - name: Commit new data
        run: |
          git config user.name "gpu-monitor-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add availability.csv
          if git diff --staged --quiet; then
            echo "No new data to commit."
          else
            git commit -m "data: poll $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            # Rebase-pull guards against a race with a manual push.
            git pull --rebase --autostash origin ${GITHUB_REF_NAME} || true
            git push
          fi

      - name: Surface poll failure
        if: steps.poll.outcome == 'failure'
        run: |
          echo "::error::Poll failed — DO_COOKIE has likely expired. A NO_DATA row was committed. Refresh the cookie and run ./refresh_cookie.sh"
          exit 1
